stages:
  - build
  - release

variables:
  GIT_DEPTH: "0"

build-docs:
  stage: build
  before_script:
    - rustup default nightly || curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y && source "$HOME/.cargo/env" && rustup default nightly
    - rustup component add rust-src llvm-tools-preview
    - if ! command -v mdbook &> /dev/null; then cargo install mdbook --no-default-features --features search; fi
  script:
    - bash tools/scripts/build-docs-site.sh
  artifacts:
    paths:
      - build/docs-site

build-os-release:
  stage: build
  before_script:
    # Sudo is required here ONLY if the runner isn't run as root and the tools aren't already installed:
    # - sudo apt-get update && sudo apt-get install -y xorriso mtools
    - rustup default nightly || curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y && source "$HOME/.cargo/env" && rustup default nightly
    - rustup component add rust-src llvm-tools-preview
    - rustup target add x86_64-unknown-none
    - if ! command -v cargo-make &> /dev/null; then cargo install cargo-make; fi
  script:
    - cargo make limine-image-release
  artifacts:
    paths:
      - build/strat9-os.iso
      - build/strat9-os.img
    expire_in: 1 week

release-latest:
  stage: release
  needs: [build-os-release]
  only:
    - main
  script:
    - |
      ISO_URL="${CI_PROJECT_URL}/-/jobs/artifacts/main/raw/build/strat9-os.iso?job=build-os-release"
      IMG_URL="${CI_PROJECT_URL}/-/jobs/artifacts/main/raw/build/strat9-os.img?job=build-os-release"
      curl --silent --request DELETE \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/latest" || true
      curl --silent --request DELETE \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/tags/latest" || true
      curl --silent --fail --request POST \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{\"tag_name\": \"latest\", \"ref\": \"${CI_COMMIT_SHA}\"}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/tags"
      curl --silent --fail --request POST \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{\"name\": \"Latest build (pipeline ${CI_PIPELINE_ID})\", \"tag_name\": \"latest\", \"description\": \"Pipeline ${CI_PIPELINE_ID} - ${CI_COMMIT_SHORT_SHA}\", \"assets\": {\"links\": [{\"name\": \"strat9-os.iso\", \"url\": \"${ISO_URL}\", \"link_type\": \"other\"}, {\"name\": \"strat9-os.img\", \"url\": \"${IMG_URL}\", \"link_type\": \"other\"}]}}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"