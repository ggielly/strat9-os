stages:
  - build
  - release

variables:
  GIT_DEPTH: "0"
  TZ: "Europe/Paris"

build-docs:
  stage: build
  before_script:
    - rustup default nightly || curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y && source "$HOME/.cargo/env" && rustup default nightly
    - rustup component add rust-src llvm-tools-preview
    - if ! command -v mdbook &> /dev/null; then cargo install mdbook --no-default-features --features search; fi
  script:
    - bash tools/scripts/build-docs-site.sh
  artifacts:
    paths:
      - build/docs-site

build-os-release:
  stage: build
  before_script:
    # Sudo is required here ONLY if the runner isn't run as root and the tools aren't already installed:
    # - sudo apt-get update && sudo apt-get install -y xorriso mtools
    - rustup default nightly || curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y && source "$HOME/.cargo/env" && rustup default nightly
    - rustup component add rust-src llvm-tools-preview
    - rustup target add x86_64-unknown-none
    - if ! command -v cargo-make &> /dev/null; then cargo install cargo-make; fi
  script:
    - cargo make limine-image-release
  artifacts:
    paths:
      - build/strat9-os.iso
      - build/strat9-os.img
    expire_in: 12 week

release-latest:
  stage: release
  needs:
    - job: build-os-release
      artifacts: true
  only:
    - main
  script:
    # Use short commit SHA as build identifier (no timestamp)
    - COMMIT="${CI_COMMIT_SHORT_SHA}"
    - TAG_NAME="build-${COMMIT}"
    - ISO_NAME="strat9-os-${COMMIT}.iso"
    - IMG_NAME="strat9-os-${COMMIT}.img"
    - RELEASE_NAME="Strat9-OS ${COMMIT}"
    - DESCRIPTION="Automated build for commit ${CI_COMMIT_SHORT_SHA} (pipeline ${CI_PIPELINE_ID})"
    # Verify artifacts are present
    - test -f build/strat9-os.iso
    - test -f build/strat9-os.img
    # Rename with commit SHA
    - cp build/strat9-os.iso "${ISO_NAME}"
    - cp build/strat9-os.img "${IMG_NAME}"
    - |
      PROJECT_ID="${CI_PROJECT_ID}"
      GITLAB_API="${CI_SERVER_URL}/api/v4"
      TOKEN="${GITLAB_RELEASE_TOKEN}"

      # Create the tag via REST API (no git push needed)
      curl --silent --fail --request POST \
        --header "PRIVATE-TOKEN: ${TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{\"tag_name\": \"${TAG_NAME}\", \"ref\": \"${CI_COMMIT_SHA}\"}" \
        "${GITLAB_API}/projects/${PROJECT_ID}/repository/tags"

      # Create the release linked to the tag
      curl --silent --fail --request POST \
        --header "PRIVATE-TOKEN: ${TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{\"name\": \"${RELEASE_NAME}\", \"tag_name\": \"${TAG_NAME}\", \"description\": \"${DESCRIPTION}\"}" \
        "${GITLAB_API}/projects/${PROJECT_ID}/releases"

      # Upload ISO and retrieve its URL
      ISO_UPLOAD="$(curl --silent --fail \
        --header "PRIVATE-TOKEN: ${TOKEN}" \
        --form "file=@${ISO_NAME}" \
        --request POST \
        "${GITLAB_API}/projects/${PROJECT_ID}/uploads")"
      ISO_URL="$(printf '%s' "${ISO_UPLOAD}" | sed -n 's/.*"url":"\([^"]*\)".*/\1/p')"

      # Upload IMG and retrieve its URL
      IMG_UPLOAD="$(curl --silent --fail \
        --header "PRIVATE-TOKEN: ${TOKEN}" \
        --form "file=@${IMG_NAME}" \
        --request POST \
        "${GITLAB_API}/projects/${PROJECT_ID}/uploads")"
      IMG_URL="$(printf '%s' "${IMG_UPLOAD}" | sed -n 's/.*"url":"\([^"]*\)".*/\1/p')"

      # Attach ISO as a release asset
      curl --silent --fail --request POST \
        --header "PRIVATE-TOKEN: ${TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{\"name\": \"${ISO_NAME}\", \"url\": \"${CI_SERVER_URL}${ISO_URL}\", \"link_type\": \"other\"}" \
        "${GITLAB_API}/projects/${PROJECT_ID}/releases/${TAG_NAME}/assets/links"

      # Attach IMG as a release asset
      curl --silent --fail --request POST \
        --header "PRIVATE-TOKEN: ${TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{\"name\": \"${IMG_NAME}\", \"url\": \"${CI_SERVER_URL}${IMG_URL}\", \"link_type\": \"other\"}" \
        "${GITLAB_API}/projects/${PROJECT_ID}/releases/${TAG_NAME}/assets/links"